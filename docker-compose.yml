services:
  # Rust 后端 API
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: media_server_app
    restart: unless-stopped
    # 建议让容器使用与宿主机相同的 UID/GID 写盘，避免 SMB/本地权限打架
    # start.sh 会默认注入 APP_UID/APP_GID；也可自行 export 覆盖
    user: "${APP_UID:-0}:${APP_GID:-0}"
    ports:
      - "8080:8080"
    volumes:
      - ${HOST_STORAGE_ROOT:-./media_storage}:/data
    environment:
      - STORAGE_ROOT=/data
      - DATABASE_URL=postgres://user:pass@db:5432/mediadb
      - BIND_ADDR=0.0.0.0:8080
      - RAW_DIR=/data/raw
      - PROXIES_DIR=/data/proxies
      - TEMP_DIR=/data/.temp
      - JOB_POLL_INTERVAL_MS=500
      - FFMPEG_BIN=ffmpeg
      - FFPROBE_BIN=ffprobe
      # 第三阶段：AI 服务地址
      - AI_SERVICE_URL=http://ai:8000
    depends_on:
      - db
      - ai

  # PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg15
    container_name: media_server_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mediadb
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # CLIP AI 服务
  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: media_server_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 共享存储，用于从本地路径读取缩略图/视频
      - ${HOST_STORAGE_ROOT:-./media_storage}:/data:ro
      # 模型缓存持久化
      - ./ai_cache:/root/.cache/huggingface
    environment:
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
