services:
  # 用于本机/开发环境快速测试的 SMB（Samba）服务
  #
  # 说明：
  # - macOS / Windows 上 Docker Desktop 往往无法“干净地”绑定 445（容易与系统 SMB 冲突）
  # - 因此这里默认把宿主机端口映射到 1445，容器内部仍是 445
  # - 客户端连接时需要显式指定端口（见 readme）
  samba:
    image: dperson/samba:latest
    container_name: media_server_samba
    restart: unless-stopped
    ports:
      - "1445:445"
    volumes:
      # 你要共享的根目录（默认：项目内 ./media_storage/raw）
      - ${SMB_SHARE_ROOT:-./media_storage/raw}:/share
    # dperson/samba 通过命令行参数创建用户与共享
    # -u: "user;pass"
    # -s: "name;/path;rw;guest;users;admins"
    # 这里 guest 禁用，强制走账号密码
    command:
      - "-p"
      # Docker Desktop(macOS/Windows) 的 bind mount 往往不支持完整的 xattr/资源分叉，
      # 默认的 fruit/streams_xattr 会导致刷屏：ad_open_rsrc / ad_convert_xattr 等。
      # 这里显式关闭 fruit/streams_xattr，仅保留 catia（mac 兼容）+ recycle（回收站）。
      - "-g"
      - "vfs objects = catia recycle"
      - "-u"
      - "${SMB_USER:-pandavault};${SMB_PASS:-pandavault}"
      - "-s"
      # 格式：name;/path;browse;readonly;guest;users
      - "RawMaterials;/share;yes;no;no;${SMB_USER:-pandavault}"


